  <text x="204" y="62" fill="#a9c5c3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="650">Public source visibility supports review and evaluation. It does not grant production, resale, hosting, or brand rights.</text>
