<svg xmlns="http://www.w3.org/2000/svg" width="920" height="156" viewBox="0 0 920 156" role="img" aria-label="LidoPro local-first product surfaces">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#edf8f5"/>
      <stop offset="0.48" stop-color="#fbfcf8"/>
      <stop offset="1" stop-color="#edf7f8"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="920" height="156" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="919" height="155" rx="19.5" fill="none" stroke="#c4ddd8"/>

  <text x="30" y="34" fill="#0f3f3c" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="900" letter-spacing="2.6">LOCAL-FIRST OPERATING SURFACES</text>
  <text x="30" y="58" fill="#5f7773" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="650">One local project state connects layout, reservations, customers, pricing, and account records around the beach map.</text>

  <g transform="translate(30 83)">
    <rect width="148" height="42" rx="11" fill="url(#core)"/>
    <text x="16" y="18" fill="#ccfbf1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10.5" font-weight="900" letter-spacing="1.3">OPERATING CORE</text>
    <text x="16" y="32" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="850">Beach map first</text>
  </g>

  <path d="M190 104 H872" stroke="#c8ddd8" stroke-width="2" stroke-linecap="round"/>

  <g transform="translate(208 78)" filter="url(#cardShadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g>
      <rect width="118" height="54" rx="12" fill="#ffffff" stroke="#c7dfd8"/>
      <rect width="118" height="5" rx="2.5" fill="#0f766e"/>
      <text x="14" y="25" fill="#0f3f3c" font-size="13" font-weight="900">Lido Studio</text>
      <text x="14" y="42" fill="#607672" font-size="11" font-weight="650">layout + map</text>
    </g>
    <g transform="translate(136 0)">
      <rect width="122" height="54" rx="12" fill="#ffffff" stroke="#c7dfd8"/>
      <rect width="122" height="5" rx="2.5" fill="#2563eb"/>
      <text x="14" y="25" fill="#0f3f3c" font-size="13" font-weight="900">Lido Booking</text>
      <text x="14" y="42" fill="#607672" font-size="11" font-weight="650">reservations</text>
    </g>
    <g transform="translate(276 0)">
      <rect width="112" height="54" rx="12" fill="#ffffff" stroke="#c7dfd8"/>
      <rect width="112" height="5" rx="2.5" fill="#7c3aed"/>
      <text x="14" y="25" fill="#0f3f3c" font-size="13" font-weight="900">Lido Clienti</text>
      <text x="14" y="42" fill="#607672" font-size="11" font-weight="650">registry</text>
    </g>
    <g transform="translate(406 0)">
      <rect width="112" height="54" rx="12" fill="#ffffff" stroke="#c7dfd8"/>
      <rect width="112" height="5" rx="2.5" fill="#d97706"/>
      <text x="14" y="25" fill="#0f3f3c" font-size="13" font-weight="900">Lido Listino</text>
      <text x="14" y="42" fill="#607672" font-size="11" font-weight="650">tariffs + extras</text>
    </g>
    <g transform="translate(536 0)">
      <rect width="118" height="54" rx="12" fill="#ffffff" stroke="#c7dfd8"/>
      <rect width="118" height="5" rx="2.5" fill="#ea580c"/>
      <text x="14" y="25" fill="#0f3f3c" font-size="13" font-weight="900">Conti locali</text>
      <text x="14" y="42" fill="#607672" font-size="11" font-weight="650">ledger records</text>
    </g>
